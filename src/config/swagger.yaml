# ──────────────────────────────────────────
# Components
# ──────────────────────────────────────────

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    teamId:
      name: teamId
      in: path
      required: true
      schema:
        type: integer
      example: 1
    taskId:
      name: taskId
      in: path
      required: true
      schema:
        type: integer
      example: 5
    commentId:
      name: commentId
      in: path
      required: true
      schema:
        type: integer
      example: 10
  #   archiveId:
  #     name: archiveId
  #     in: path
  #     required: true
  #     schema:
  #       type: integer
  #     example: 3

  responses:
    Unauthorized:
      description: 인증 토큰이 없거나 유효하지 않습니다
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            data: null
            meta: null
            error: 인증 토큰이 없거나 유효하지 않습니다
    Forbidden:
      description: 해당 작업에 대한 권한이 없습니다
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            data: null
            meta: null
            error: 해당 작업에 대한 권한이 없습니다
    NotFound:
      description: 요청한 리소스를 찾을 수 없습니다
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            data: null
            meta: null
            error: 요청한 리소스를 찾을 수 없습니다
    Conflict:
      description: 이미 존재하는 리소스입니다
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            success: false
            data: null
            meta: null
            error: 이미 존재하는 리소스입니다

  schemas:
    # ── 공통 응답 래퍼 ──
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
        meta:
          type: object
          nullable: true
          example: null
        error:
          type: string
          nullable: true
          example: null

    MessageResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            message:
              type: string
