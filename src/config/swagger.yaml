openapi: 3.0.3
info:
  title: i-Station API
  description: i-Station 팀 협업 플랫폼 API 명세서
  version: 1.0.0

servers:
  - url: /

tags:
  - name: Auth
    description: 인증 및 유저 관리
  - name: Users
    description: 로그인 유저 정보 및 상태
  - name: Teams
    description: 팀 로비 (생성, 가입, 탈퇴 등)
  - name: Tasks
    description: 요청 시스템 (칸반 보드)
  - name: Comments
    description: 실시간 댓글
  - name: Archives
    description: 아카이브 및 링크
  - name: Logs
    description: 팀 활동 로그

paths:
  # ──────────────────────────────────────────
  # 1. Auth
  # ──────────────────────────────────────────

  /auth/signup:
    post:
      tags: [Auth]
      summary: 회원가입
      description: 이메일, 비밀번호, 이름, 전화번호, 깃허브를 받아 유저를 생성합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, name, phone]
              properties:
                email:
                  type: string
                  format: email
                  example: mail@istation.dev
                password:
                  type: string
                  minLength: 8
                  example: password123!
                name:
                  type: string
                  minLength: 2
                  maxLength: 20
                  example: 홍길동
                phone:
                  type: string
                  example: 010-1234-5678
                github_url:
                  type: string
                  nullable: true
                  example: https://github.com/username
      responses:
        "201":
          description: 회원가입 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/UserResponse"
                      meta:
                        nullable: true
                        example: null
        "409":
          description: 이미 사용 중인 이메일
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      tags: [Auth]
      summary: 로그인
      description: JWT 토큰 발급 및 유저 정보(team_id 포함) 반환. 로그인 시 상태가 활동으로 변경됩니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: mail@istation.dev
                password:
                  type: string
                  example: password123!
      responses:
        "200":
          description: 로그인 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          token:
                            type: string
                            example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                          user:
                            $ref: "#/components/schemas/UserResponse"
                      meta:
                        nullable: true
                        example: null
        "401":
          description: 이메일 혹은 비밀번호가 일치하지 않습니다
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      tags: [Auth]
      summary: 로그아웃
      description: 토큰 무효화. 로그아웃 시 상태가 자리비움으로 변경됩니다.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: 로그아웃 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/google:
    post:
      tags: [Auth]
      summary: 구글 OAuth 로그인 / 회원가입
      description: |
        구글 OAuth 인증을 처리합니다.
        - 최초 로그인 시: 구글에서 제공하는 Email, Name, Profile Image 데이터를 받아 DB에 저장 후 팀 로비로 이동합니다.
        - 기존 가입자: 구글 계정 고유 ID(google_uid)를 대조하여 일치하는 계정이 있으면 즉시 로그인 처리합니다.
        - 자체 이메일로 이미 가입된 계정과 이메일이 같을 경우 기존 계정에 연동하거나 안내 메시지를 반환합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id_token]
              properties:
                id_token:
                  type: string
                  description: 구글 OAuth ID 토큰
                  example: ya29.a0AfH6SMC...
      responses:
        "200":
          description: 구글 로그인 / 회원가입 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          token:
                            type: string
                            example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                          user:
                            $ref: "#/components/schemas/UserResponse"
                      meta:
                        nullable: true
                        example: null
        "409":
          description: 이미 자체 이메일로 가입된 계정
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ──────────────────────────────────────────
  # 2. Users
  # ──────────────────────────────────────────

  /users/me:
    get:
      tags: [Users]
      summary: 로그인 유저 정보 조회
      security:
        - BearerAuth: []
      responses:
        "200":
          description: 내 정보 반환
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/UserResponse"
                      meta:
                        nullable: true
                        example: null
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users/me/status:
    patch:
      tags: [Users]
      summary: 내 상태 업데이트
      description: |
        내 배지 상태(💻 개발 중, ☕ 휴식 중, 🗣 회의 중)를 변경하고 Pusher로 실시간 전송합니다.
        자리비움(⛔️)은 사용자가 임의로 선택할 수 없습니다.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: ["업무 중", "회의 중", "쉬는 중"]
                  example: 업무 중
      responses:
        "200":
          description: 상태 변경 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: 잘못된 상태값 (자리비움 직접 선택 불가)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ──────────────────────────────────────────
  # 3. Teams (팀 로비)
  # ──────────────────────────────────────────

  /teams:
    get:
      tags: [Teams]
      summary: 팀 목록 전체 조회
      description: 모든 팀의 목록을 조회합니다. 각 팀에 소속 팀원 목록도 함께 반환합니다. (Board용)
      security:
        - BearerAuth: []
      responses:
        "200":
          description: 팀 목록 반환
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/TeamWithMembers"
                      meta:
                        nullable: true
                        example: null
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      tags: [Teams]
      summary: 팀 생성
      description: 새로운 팀(스페이스)을 생성합니다. 팀 이름은 2자 이상 30자 이하이며 중복될 수 없습니다.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, pin_password]
              properties:
                name:
                  type: string
                  minLength: 2
                  maxLength: 30
                  example: i들의 반란
                pin_password:
                  type: string
                  pattern: '^\d{6}$'
                  example: "123456"
      responses:
        "201":
          description: 팀 생성 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Team"
                      meta:
                        nullable: true
                        example: null
        "409":
          description: 이미 존재하는 팀 이름
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /teams/{teamId}:
    delete:
      tags: [Teams]
      summary: 팀 삭제
      description: 팀과 관련된 모든 데이터를 삭제합니다. 삭제 전 재확인이 필요합니다.
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/teamId"
      responses:
        "200":
          description: 팀 삭제 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /teams/{teamId}/members:
    post:
      tags: [Teams]
      summary: 팀 가입 / 입장
      description: |
        최초 발생 시 핀 번호를 입력하여 팀에 가입합니다.
        이후에는 별도 절차 없이 입장합니다.
        비밀번호 오기입 시 반려됩니다.
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/teamId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password, userId]
              properties:
                password:
                  type: string
                  pattern: '^\d{6}$'
                  example: "123456"
                userId:
                  type: integer
                  description: 현재 로그인한 유저 ID
                  example: 1
      responses:
        "200":
          description: 팀 가입 / 입장 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: 비밀번호 불일치
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /teams/{teamId}/members/me:
    delete:
      tags: [Teams]
      summary: 팀 탈퇴
      description: 현재 로그인한 유저가 팀에서 탈퇴합니다. 모든 팀원 탈퇴 시 팀이 삭제됩니다.
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/teamId"
      responses:
        "200":
          description: 팀 탈퇴 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /teams/{teamId}/members/me/position:
    patch:
      tags: [Teams]
      summary: 팀 내 포지션 수정
      description: 현재 로그인한 유저의 팀 내 포지션을 수정합니다. 디폴트값은 '팀원'입니다.
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/teamId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [position]
              properties:
                position:
                  type: string
                  maxLength: 50
                  example: Backend Lead
      responses:
        "200":
          description: 포지션 수정 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /teams/{teamId}/members/active:
    get:
      tags: [Teams]
      summary: 활동 중인 팀원 목록 조회
      description: 상태가 자리비움이 아닌 팀원 명단을 반환합니다.
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/teamId"
      responses:
        "200":
          description: 활동 중인 팀원 목록
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/TeamMember"
                      meta:
                        nullable: true
                        example: null
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ──────────────────────────────────────────
  # 4. Tasks (요청 시스템 / 칸반 보드)
  # ──────────────────────────────────────────

  /teams/{teamId}/tasks:
    get:
      tags: [Tasks]
      summary: 테스크 목록 조회
      description: |
        내 팀(team_id)의 모든 테스크를 조회합니다. (Board용)
        반환값에 taskQuantity(상태별 카드 개수) 및 댓글 개수도 함께 반환합니다.
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/teamId"
      responses:
        "200":
          description: 테스크 목록 반환
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          taskQuantity:
                            type: object
                            properties:
                              Todo:
                                type: integer
                                example: 3
                              Doing:
                                type: integer
                                example: 1
                              Done:
                                type: integer
                                example: 2
                              Checked:
                                type: integer
                                example: 4
                          tasks:
                            type: array
                            items:
                              $ref: "#/components/schemas/TaskWithCommentCount"
                      meta:
                        nullable: true
                        example: null
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    post:
      tags: [Tasks]
      summary: 테스크 생성
      description: 요청자, 담당자, 내용을 입력하여 테스크를 생성합니다. 기본 상태는 Todo입니다.
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/teamId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, content]
              properties:
                title:
                  type: string
                  maxLength: 50
                  example: 홈이요 API 추가
                content:
                  type: string
                  example: 홈이요 API 추가해주세요.
                worker_id:
                  type: integer
                  nullable: true
                  description: 담당자 유저 ID (미지정 가능)
                  example: 2
      responses:
        "201":
          description: 테스크 생성 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Task"
                      meta:
                        nullable: true
                        example: null
        "400":
          description: 타이틀 미입력 등 필수값 오류
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /tasks/{taskId}:
    get:
      tags: [Tasks]
      summary: 테스크 상세 조회
      description: 테스크 내용과 댓글 목록을 한 번에 조회합니다.
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/taskId"
      responses:
        "200":
          description: 테스크 상세 반환
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/TaskDetail"
                      meta:
                        nullable: true
                        example: null
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [Tasks]
      summary: 테스크 삭제
      description: 테스크를 삭제합니다. 삭제 이력은 로그에 추가됩니다. (로그 자체는 삭제되지 않습니다)
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/taskId"
      responses:
        "200":
          description: 테스크 삭제 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /tasks/{taskId}/status:
    patch:
      tags: [Tasks]
      summary: 테스크 상태 변경
      description: |
        테스크의 상태를 변경하고 로그를 자동으로 생성합니다.
        - 수락하기: Doing으로 이동 (담당자만 클릭 가능)
        - 개발 완료: Done으로 이동 (담당자만 클릭 가능)
        - 반려: Doing으로 이동 (요청자만 클릭 가능)
        - 최종 확인: Checked로 이동 및 완료 처리 (요청자만 클릭 가능)
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/taskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [Todo, Doing, Done, Checked]
                  example: Doing
      responses:
        "200":
          description: 상태 변경 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Task"
                      meta:
                        nullable: true
                        example: null
        "400":
          description: 잘못된 상태값
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ──────────────────────────────────────────
  # 5. Comments (실시간 댓글)
  # ──────────────────────────────────────────

  /tasks/{taskId}/comments:
    post:
      tags: [Comments]
      summary: 댓글 작성
      description: 댓글을 저장하고 Pusher로 실시간 전송합니다.
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/taskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                  example: 네, 확인했습니다!
      responses:
        "201":
          description: 댓글 작성 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Comment"
                      meta:
                        nullable: true
                        example: null
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /tasks/comments/{commentId}:
    patch:
      tags: [Comments]
      summary: 댓글 수정
      description: 댓글을 수정하고 Pusher로 실시간 전송합니다.
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/commentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
