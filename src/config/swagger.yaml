openapi: 3.0.3
info:
  title: i-Station API
  description: i-Station 팀 협업 플랫폼 API 명세서
  version: 1.0.0

servers:
  - url: /

tags:
  - name: Auth
    description: 인증 및 유저 관리
  - name: Users
    description: 로그인 유저 정보 및 상태
  - name: Teams
    description: 팀 로비 (생성, 가입, 탈퇴 등)
  - name: Tasks
    description: 요청 시스템 (칸반 보드)
  - name: Comments
    description: 실시간 댓글
  - name: Archives
    description: 아카이브 및 링크
  - name: Logs
    description: 팀 활동 로그

