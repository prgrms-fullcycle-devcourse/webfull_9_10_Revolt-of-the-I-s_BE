  # # 3. Teams (팀 로비)
  # # ──────────────────────────────────────────

  /teams:
    get:
      tags: [Teams]
      summary: 팀 목록 전체 조회
      description: 모든 팀의 목록을 조회합니다. 각 팀에 소속 팀원 목록도 함께 반환합니다. (Board용). isMember로 현재 로그인하고 있는 유저가 팀에 가입된 상태인지 구별합니다.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: 팀 목록 반환
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/TeamWithMembers"
                      meta:
                        nullable: true
                        example: null
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      tags: [Teams]
      summary: 팀 생성
      description: |
        새로운 팀(스페이스)을 생성합니다. 

        **[검증 로직]**
        1. **이름**: 2자 이상 30자 이하 (공백 제외). 중복 불가.
        2. **핀 번호**: 반드시 **숫자 6자리** 형식이어야 함.
        3. **자동 가입**: 팀 생성 성공 시, 생성자는 해당 팀의 첫 번째 멤버로 자동 등록됩니다.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, pin_password]
              properties:
                name:
                  type: string
                  minLength: 2
                  maxLength: 30
                  example: i들의 반란
                pin_password:
                  type: string
                  pattern: '^\d{6}$'
                  example: "123456"
      responses:
        "201":
          description: 팀 생성 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Team"
                      meta:
                        nullable: true
                        example: null
        "400":
          description: 입력값 유효성 검사 실패 (이름 길이 또는 핀 번호 형식 오류)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                nameError:
                  summary: 이름 길이 오류
                  value:
                    success: false
                    data: null
                    meta: null
                    error: "팀 이름은 2자 이상 30자 이하로 입력해주세요."
                pinError:
                  summary: 핀 번호 형식 오류
                  value:
                    success: false
                    error: "핀 번호는 6자리 숫자여야 합니다."
        "409":
          description: 이름 중복
          $ref: "#/components/responses/Conflict"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /teams/{teamId}/members:
    post:
      tags: [Teams]
      summary: 팀 가입 / 입장
      description: |
        최초 발생 시 핀 번호를 입력하여 팀에 가입합니다.
        이후에는 별도 절차 없이 입장합니다.
        비밀번호 오기입 시 반려됩니다.

        **[로직 가이드]**
        1. **기존 멤버 (`isMember: true`)**: `password` 없이 호출해도 입장 성공.
        2. **신규 유저 (`isMember: false`)**: 반드시 6자리 `password`를 포함해야 함.
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/teamId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId]
              properties:
                password:
                  type: string
                  nullable: true
                  description: |
                    팀 입장용 6자리 핀 번호  
                    (신규 유저일 경우 필수)
                  pattern: '^\d{6}$'
                  example: "123456"
                userId:
                  type: integer
                  description: 현재 로그인한 유저 ID
                  example: 1
      responses:
        "200":
          description: |
            팀 가입 / 입장 성공
            - 기본 멤버: 바로 입장
            - 신규 유저: 비밀번호 검증 후 가입 완료
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: |
            잘못된 요청

            - password 누락 (신규 유저)
            - password 형식 오류 (6자리 숫자 아님)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                missing_password:
                  summary: 비밀번호 누락
                  value:
                    success: false
                    data: null
                    meta: null
                    error: "비밀번호가 필요합니다."
                invalid_format:
                  summary: 형식 오류
                  value:
                    success: false
                    data: null
                    meta: null
                    error: "핀 번호는 6자리 숫자여야 합니다."
        "401":
          description: 인증 토큰이 없거나 유요하지 않음
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: 비밀번호 불일치
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                data: null
                meta: null
                error: "비밀번호가 올바르지 않습니다."
        "404":
          description: 해당하는 팀 없음
          $ref: "#/components/responses/NotFound"

  /teams/{teamId}/members/me:
    delete:
      tags: [Teams]
      summary: 팀 탈퇴
      description: 현재 로그인한 유저가 팀에서 탈퇴합니다. 모든 팀원 탈퇴 시 팀이 삭제됩니다.
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/teamId"
      responses:
        "200":
          description: 팀 탈퇴 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: 팀장은 탈퇴할 수 없습니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                success: false
                data: null
                meta: null
                error: "팀장은 팀을 탈퇴할 수 없습니다. 팀 삭제를 이용하세요."
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: 해당 team의 멤버가 아님
          $ref: "#/components/responses/NotFound"
        "404":
          description: 해당 team이 없을 떄
          $ref: "#/components/responses/NotFound"

  /teams/{teamId}/members/me/position:
    patch:
      tags: [Teams]
      summary: 팀 내 포지션 수정
      description: 현재 로그인한 유저의 팀 내 포지션을 수정합니다. 디폴트값은 '팀원'입니다.
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/teamId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [position]
              properties:
                position:
                  type: string
                  maxLength: 50
                  example: Backend Lead
      responses:
        "200":
          description: 포지션 수정 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      user_id:
                        type: integer
                        example: 1
                      position:
                        type: string
                        example: Backend Lead
                  meta:
                    nullable: true
                    example: null
                  error:
                    nullable: true
                    example: null
        "400":
          description: 잘못된 요청 (포지션 검증 실패)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                empty_position:
                  summary: 포지션 누락
                  value:
                    success: false
                    data: null
                    meta: null
                    error: "포지션을 입력해주세요."
                too_long:
                  summary: 길이 초과
                  value:
                    success: false
                    data: null
                    meta: null
                    error: "포지션은 20자 이내로 입력해주세요."
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: 해당 team의 멤버가 아님
          $ref: "#/components/responses/NotFound"
        "404":
          description: 해당 team이 없을 떄
          $ref: "#/components/responses/NotFound"

  /teams/{teamId}/members/active:
    get:
      tags: [Teams]
      summary: 활동 중인 팀원 목록 조회
      description: 상태가 자리비움이 아닌 팀원 명단을 반환합니다.
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/teamId"
      responses:
        "200":
          description: 활동 중인 팀원 목록
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/TeamMember"
                      meta:
                        nullable: true
                        example: null
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: 해당하는 팀 없음
          $ref: "#/components/responses/NotFound"

  # ──────────────────────────────────────────
  # 4. Tasks (요청 시스템 / 칸반 보드)
  # ──────────────────────────────────────────

  /teams/{teamId}/tasks:
    get:
      tags: [Tasks]
      summary: 테스크 목록 조회 (Board용)
      description: 팀의 모든 테스크와 상태별 개수, 댓글 개수를 반환합니다.
      parameters:
        - $ref: "#/components/parameters/teamId"
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          taskQuantity:
                            $ref: "#/components/schemas/TaskQuantity"
                          tasks:
                            type: array
                            items:
                              $ref: "#/components/schemas/TaskWithCommentCount"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      tags: [Tasks]
      summary: 테스크 생성
      description: 새로운 테스크를 생성하고 담당자에게 알림을 보냅니다.
      parameters:
        - $ref: "#/components/parameters/teamId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, content]
              properties:
                title:
                  type: string
                  example: "기획서 수정 요청"
                content:
                  type: string
                  example: "맛집 루트 수정 부탁드려요"
                worker_id:
                  type: string
                  nullable: true
                  example: "2"
      responses:
        "201":
          description: 생성 성공
          content:
            application/json:
              schema:
                - $ref: "#/components/schemas/SuccessResponse"
                - type: object
                  properties:
                    data:
                      $ref: "#/components/schemas/TaskWithCommentCount"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /tasks/{taskId}:
    get:
      tags: [Tasks]
      summary: 테스크 상세 조회
      description: 테스크 내용과 댓글 목록을 함께 조회합니다.
      parameters:
        - $ref: "#/components/parameters/taskId"
      responses:
        "200":
          description: 조회 성공
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
